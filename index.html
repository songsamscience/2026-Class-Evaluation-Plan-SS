    <script>

        // State
        let currentGrade = '1';
        let currentSemester = '1';
        let currentSubject = '과학 (물질의 상태 변화)';
        let is15Revision = false; // 3학년(15개정) 체크용

        // Generate Template Function
        function generateTemplate() {
            // 3학년일 경우 15개정, 그 외는 22개정으로 텍스트 일부 변경
            const revisionText = is15Revision ? "2015 개정" : "2022 개정";

            return `# Name
송쌤과학 교수학습 평가계획 프롬프트 생성기

# Role
당신은 20년 이상의 경력을 가진 베테랑 중학교 교사이자, 과정중심평가 및 ${revisionText} 교육과정 전문 컨설턴트입니다. 
지금부터 ${revisionText} 교육과정 성취기준에 기반하여 **[중학교 ${currentGrade}학년 ${currentSemester}학기 ${currentSubject}]** 과목에 대한 4가지 파트로 구성된 완벽한 마크다운 표 형태의 계획서를 작성해 주십시오.

# Core Guidelines
## 1. 평가 비율 및 구성 (2026 중등 학생평가 내실화 계획 엄수)
- **수행평가:** 학기 성적의 **40% 이상** 필수 반영.
- **서·논술형:** 학기 성적의 **30% 이상** 필수 반영 (정기시험 내 서·논술형 + 수행평가 합산).
- **실험/실습 평가:** 교과 특성을 반영하여 수행평가 내 **10~20%** 필수 포함.
- **금지 사항:** 단편적 지식 암기, 가정에서 해오는 과제형 수행평가. 반드시 수업 중 실시간 과정 평가로 설계할 것.

## 2. ${revisionText} 교육과정 및 에듀테크 적용
- **성취기준 해설서 참고:** 교육과정 성취기준 해설서가 지식이나 파일로 제공되고 있으면, 내용을 참고하여 작성할 것.
- **백워드 설계:** [목표(바라는 결과) ⇨ 평가 계획 ⇨ 학습 경험]의 유기적 연계.
- **핵심 아이디어 중심:** [지식·이해], [과정·기능], [가치·태도]를 통합적으로 평가.
- **에듀테크 활용:** 필요 단원에서는 가상실험(Virtual Lab) 및 에듀테크 도구 활용 방안을 적극 포함할 것. AI는 보조 도구로만 활용(프롬프트 작성 과정 및 출처 표기 평가 반영).
- **교과 연계:** 비고란에 안전 교육(학기당 2시간 이상), 사회정서교육, 생태전환교육 적절히 배치.

## 3. 루브릭 및 성취수준 작성 규칙
- **성취수준 (A~E):** 지식, 기능, 태도를 융합하여 포괄적이고 명확하게 서술.
- **루브릭 척도:** 변별만을 위한 1~2점 단위 배점을 지양하고, 3~5단계 척도 사용.
- **긍정적 서술:** 학생의 수행 특성을 긍정적인 문장(~할 수 있다, ~함)으로 구체화.
- **기본 점수 부여:** '미제출 시 0점' 처리를 지양하고, 계획 및 참여도 등 과정 평가를 통해 기본 점수를 부여하도록 설계.

# Output Format
반드시 아래의 마크다운 표 양식을 엄격히 준수하여 출력하십시오.

### 1. [${currentGrade}학년 ${currentSemester}학기 ${currentSubject}] 교수·학습 운영 계획
| 월 | 주 | 주제/단원명 | 핵심 아이디어 및 성취기준 | 교수·학습 내용(수업방법) | 평가 및 피드백 방법 | 비고(안전/생태 등) |

| | | | | | | |

### 2. 평가 개요 및 학기단위 성취수준
- **성적 산출 방식:** 성취도 5단계 (A-B-C-D-E) 적용
| 성취수준 | 학기 단위 종합 성취수준 진술 (지식·이해, 과정·기능, 가치·태도 융합) |

| A | |
| B | |
| C | |

| E | |

### 3. 평가 영역 및 반영 비율
| 평가 영역 | 고사/영역명 | 반영비율(합계 100%) | 만점 | 성취기준 |

| **정기시험** | 중간고사 (선택형+서논술형) | % | 100 | |
| **정기시험** | 기말고사 (선택형+서논술형) | % | 100 | |
| **수행평가** | [실험/실습] 과제명 | % | | |
| **수행평가** | [서논술형/프로젝트] 과제명 | % | | |

### 4. 수행평가 세부 계획 및 루브릭 (대표 과제 2개)

- **성취기준:** - **평가 요소:** - **평가 방법:** | 채점 요소 | 탁월 (A) | 우수 (B) | 보통 (C) | 초보 (D/E) | 배점 |

# Action
위 지침과 출력 양식을 완벽히 준수하여, 즉시 **[중학교 ${currentGrade}학년 ${currentSemester}학기 ${currentSubject}]** 교수학습 및 평가 운영 계획서를 작성해 주세요.`;
        }

        // Update Textarea
        function updatePreview() {
            promptOutput.value = generateTemplate();
        }

        // Event Listeners for inputs
        gradeSelect.addEventListener('change', (e) => {
            currentGrade = e.target.value;
            // 3학년 선택 시 15개정 플래그 켜기
            is15Revision = (currentGrade === '3');
            updatePreview();
        });

        semesterRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentSemester = e.target.value;
                updatePreview();
            });
        });

        subjectInput.addEventListener('input', (e) => {
            currentSubject = e.target.value;
            updatePreview();
        });

        // Copy to Clipboard
        copyBtn.addEventListener('click', () => {
            const textToCopy = promptOutput.value;
            
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy).then(showCopiedState);
            } else {
                // Fallback for older browsers or non-HTTPS
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showCopiedState();
                } catch (err) {
                    console.error('복사 실패', err);
                    alert("클립보드 복사에 실패했습니다. 텍스트를 직접 드래그하여 복사해주세요.");
                }
                textArea.remove();
            }
        });

        // Visual Feedback for Copying
        function showCopiedState() {
            // Change button appearance
            copyBtn.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
            copyBtn.classList.add('bg-green-500', 'hover:bg-green-600');
            
            // Change icon to checkmark
            copyIcon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
            
            // Change text
            copyText.textContent = '복사 완료!';

            // Revert back after 2 seconds
            setTimeout(() => {
                copyBtn.classList.remove('bg-green-500', 'hover:bg-green-600');
                copyBtn.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
                copyIcon.innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>';
                copyText.textContent = '마크다운 프롬프트 복사하기';
            }, 2000);
        }

        // Initialize on load
        updatePreview();
    </script>
